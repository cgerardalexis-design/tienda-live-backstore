<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda de Ropa</title>

  <style>
    body { margin:0; font-family: Arial; background:#f5f5f5; }

    header { background:#111; color:white; text-align:center; padding:15px; }

    nav { display:flex; justify-content:center; background:#333; }
    nav a { color:white; padding:10px; text-decoration:none; }

    .container { padding:20px; }

    .productos {
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(200px,1fr));
      gap:20px;
    }

    .producto {
      background:white;
      padding:15px;
      border-radius:10px;
      text-align:center;
    }

    button {
      background:black;
      color:white;
      border:none;
      padding:10px;
      margin-top:10px;
      cursor:pointer;
    }

    #carrito {
      position:fixed;
      right:10px;
      top:10px;
      background:white;
      padding:10px;
      border-radius:10px;
      width:200px;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    footer { background:#111; color:white; text-align:center; padding:10px; }

    .whatsapp {
      position:fixed;
      bottom:20px;
      right:20px;
      background:green;
      color:white;
      padding:15px;
      border-radius:50%;
      text-decoration:none;
      font-size:20px;
    }
  </style>
</head>

<body>

<header>
  <h1>Mi Tienda</h1>
</header>

<div id="carrito">
  <h3>🛒 Carrito</h3>
  <ul id="lista"></ul>
  <p>Total: $<span id="total">0</span></p>
</div>

<div class="container">
  <h2>Productos</h2>

  <div class="productos">

    <div class="producto">
      <h3>Remera</h3>
      <p>$5000</p>
      <button onclick="agregar('Remera',5000)">Comprar</button>
    </div>

    <div class="producto">
      <h3>Buzo</h3>
      <p>$12000</p>
      <button onclick="agregar('Buzo',12000)">Comprar</button>
    </div>

  </div>
</div>

<!-- WhatsApp -->
<a class="whatsapp" href="https://wa.me/5491141668155" target="_blank">💬</a>

<footer>
  <p>© 2026 Tienda</p>
</footer>

<script>
let total = 0;

function agregar(nombre, precio){
  let lista = document.getElementById("lista");
  let item = document.createElement("li");
  item.textContent = nombre + " - $" + precio;
  lista.appendChild(item);

  total += precio;
  document.getElementById("total").textContent = total;
}
</script>

</body>
</html>
